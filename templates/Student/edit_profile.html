{% extends "Student/student_base.html"%}
{% block content %}


{% if student %}
<div class="container border border-3 bg-white fs-5" style="width: 800px; height: auto; margin-top: 2rem;">
    <div class="head" style="margin-top: 1rem; border: 2px solid white; background-color: #0b1c16;">
        <h3 class="d-flex justify-content-center" style="font-size: 2rem; font-weight: bolder; color: aliceblue;">
            Profile</h3>
    </div>
    <form action="#" method="POST" enctype="multipart/form-data">
        <div class="row mb-3" style="margin-top: 30px;">
            <div class="col">
                <label for="full_name" class="form-label">Full Name</label>
                <input type="text" class="form-control" id="full_name" name="Fname" style="height: 3rem;"
                    value="{{student.fullname}}">
            </div>
            <div class="col">
                <label for="age" class="form-label">Age</label>
                <input type="number" class="form-control" id="age" name="Age" placeholder="Enter your Date of birth"
                    style="height: 3rem;" value="{{student.age}}">
            </div>
        </div>

        <div class="row mb-3">
            <div class="col">
                <label for="gender" class="form-label">Gender</label>
                <input type="text" class="form-control" id="gender" name="Gender"
                    placeholder="Enter your gender (eg. Male/ Female/ Other)" style="height: 3rem;"
                    value="{{student.gender}}">
            </div>
            <div class="col">
                <label for="edu" class="form-label">Qualification</label>
                <input type="text" class="form-control" id="edu" name="Edu"
                    placeholder="Enter your education(eg. BS in Data Science)" style="height: 3rem;"
                    value="{{student.qualification}}">
            </div>
        </div>
        <div class="row mb-3">
            <div class="col">
                <label for="college_name" class="form-label">College/University Name</label>
                <input type="text" class="form-control" id="college_name" name="College_name"
                    placeholder="Enter your College/University name" style="height: 3rem;"
                    value="{{student.college_name}}">
            </div>
            <div class="col">
                <label for="mobile_no" class="form-label">Mobile No.</label>
                <input type="number" class="form-control" id="mobile_no" name="M_no"
                    placeholder="Enter your working number" style="height: 3rem;" value="{{student.contact_no}}">
            </div>
        </div>
        <div class="row mb-3">
            <div class="col">
                <label for="skill" class="form-label">Skill</label>
                <input type="text" class="form-control" id="skill" name="Skill"
                    placeholder="Ex. Python, HTML, CSS, etc." style="height: 3rem;" value="{{student.skill}}">
            </div>
            <div class="col">
                <label for="work_status" class="form-label">Work Status</label>
                <input type="text" class="form-control" id="work_status" name="Work_status"
                    placeholder="Ex. Fresher, Experience(month/year)" style="height: 3rem;"
                    value="{{student.experience}}">
            </div>
        </div>
        <div class="mb-3">
            <div class="d-flex justify-content-between align-items-center">
                <label for="resume" class="form-label">Resume</label>
            
                {% if student.resume %}
                <a href="{{ url_for('static', filename = 'resumes/' ~ student.resume) }}"
                    class="btn btn-md btn-outline-primary" target="_blank">
                    View Resume
                </a>
                {% endif %}
            </div>
            <input type="file" class="form-control form-control-lg" id="resume" name="Resume" accept=".pdf">

            {% if student.resume %}

        <small class="text-muted">Current file : {{student.resume}}</small>   
        {% endif %} 
        </div>
        


        <div class="d-flex justify-content-between" style="margin-top: 35px;">
            
            <a href="{{url_for("student_home")}}" type="button" class="btn btn-outline-dark fw-bold btn-lg">Back</a>
            <button type="submit" class="btn btn-outline-primary fw-bold btn-lg ">Save</button>
        </div>
    </form>

</div>
{% endif %}

{% endblock %}
